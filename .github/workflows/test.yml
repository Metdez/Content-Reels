name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node (for crop.js parity test)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check content_machine tests

      - name: Tests (unit + HTTP; excludes e2e/slow that need real binaries/browser)
        run: pytest -m "not e2e and not slow"
