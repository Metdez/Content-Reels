name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set up Node (for crop.js parity test)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Lint (ruff)
        run: ruff check content_machine tests

      - name: Tests (unit + HTTP; excludes e2e/slow that need real binaries/browser)
        run: pytest -m "not e2e and not slow"

  e2e:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # The vendored ffmpeg/whisper are gitignored, so CI installs ffmpeg from apt.
      # seed_fixture renders real fixture media with it; the app resolves it via PATH.
      - name: Install ffmpeg + fonts
        run: sudo apt-get update && sudo apt-get install -y ffmpeg fonts-dejavu-core

      - name: Install (editable + dev deps)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Install Playwright chromium
        run: python -m playwright install --with-deps chromium

      # The deterministic UI E2E suite (34 specs). The `slow` real-render spec is
      # excluded — it is a single-render timing check, run locally/on demand.
      - name: E2E (Playwright UI specs)
        run: pytest -m "e2e and not slow"
